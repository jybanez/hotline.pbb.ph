<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PBB SITREP JS Viewer Demo</title>
    <link rel="stylesheet" href="../assets/sitrep-viewer.css">
    <style>
        body {
            margin: 0;
            background: #07111c;
            color: #e5edf8;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .demo-shell {
            min-height: 100vh;
        }

        .demo-toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(7, 17, 28, 0.96);
        }

        .demo-toolbar h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .demo-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .demo-controls input[type="file"] {
            width: 280px;
            max-width: 100%;
            color: #cbd5e1;
        }

        .demo-controls select {
            border: 1px solid rgba(96, 165, 250, 0.45);
            border-radius: 6px;
            background: #0f1b2e;
            color: #e5edf8;
            font: inherit;
            padding: 8px 10px;
        }

        .demo-controls button {
            border: 1px solid rgba(96, 165, 250, 0.55);
            border-radius: 6px;
            background: #1d4ed8;
            color: white;
            font: inherit;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
        }

        .demo-message {
            max-width: 920px;
            margin: 18px auto 0;
            padding: 12px 14px;
            border: 1px solid rgba(248, 113, 113, 0.45);
            border-radius: 8px;
            background: rgba(127, 29, 29, 0.28);
            color: #fecaca;
        }

        .demo-file {
            max-width: 920px;
            margin: 18px auto 0;
            color: #93c5fd;
            font-size: 13px;
        }

        .demo-reference {
            max-width: 920px;
            margin: 18px auto 28px;
        }

        .demo-reference h2 {
            margin: 0 0 12px;
            color: #e5edf8;
            font-size: 16px;
        }

        .demo-reference-frame {
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.45);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="demo-shell">
        <header class="demo-toolbar">
            <h1>PBB SITREP JS Viewer Demo</h1>
            <div class="demo-controls">
                <input id="sitrep-file" type="file" accept="application/json,.json">
                <select id="layout-select" aria-label="Layout">
                    <option value="document">Document</option>
                    <option value="compact">Compact</option>
                </select>
                <select id="section-select" aria-label="Section">
                    <option value="summary">Summary</option>
                    <option value="situation">Situation</option>
                    <option value="damage">Damage</option>
                    <option value="population">Population</option>
                    <option value="actions">Actions</option>
                    <option value="needs">Needs</option>
                    <option value="gaps">Gaps</option>
                    <option value="footer">Sources</option>
                </select>
                <button id="load-sample" type="button">Load Sample</button>
            </div>
        </header>

        <p id="demo-message" class="demo-message" hidden></p>
        <p id="demo-file" class="demo-file" hidden></p>

        <div id="full-viewer"></div>

        <section class="demo-reference">
            <h2>Independent Compact Section</h2>
            <div class="demo-reference-frame">
                <div id="section-viewer"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { createSitrepViewer } from '../js/sitrep-viewer.js';

        const sampleUrl = './input/sitrep.json';
        const message = document.querySelector('#demo-message');
        const fileInput = document.querySelector('#sitrep-file');
        const layoutSelect = document.querySelector('#layout-select');
        const sectionSelect = document.querySelector('#section-select');

        let payload = {};
        const fullViewer = createSitrepViewer(document.querySelector('#full-viewer'), {
            sitrep: payload,
            layout: layoutSelect.value,
            preview: true,
            sections: ['header', 'summary', 'situation', 'damage', 'population', 'actions', 'needs', 'gaps', 'footer'],
        });
        const sectionViewer = createSitrepViewer(document.querySelector('#section-viewer'), {
            sitrep: payload,
            layout: 'compact',
            section: sectionSelect.value,
        });

        function showError(error) {
            message.hidden = false;
            message.textContent = error instanceof Error ? error.message : String(error);
        }

        function clearError() {
            message.hidden = true;
            message.textContent = '';
        }

        function applyPayload(nextPayload) {
            payload = nextPayload;
            fullViewer.setSitrep(payload);
            sectionViewer.setSitrep(payload);
            const title = payload.title ? `Rendered ${payload.title}` : 'Rendered SITREP payload';
            document.querySelector('#demo-file').hidden = false;
            document.querySelector('#demo-file').textContent = title;
        }

        async function loadSample() {
            clearError();
            const response = await fetch(sampleUrl);
            if (!response.ok) {
                throw new Error(`Sample SITREP failed to load (${response.status}).`);
            }
            applyPayload(await response.json());
        }

        document.querySelector('#load-sample').addEventListener('click', () => {
            loadSample().catch(showError);
        });

        sectionSelect.addEventListener('change', () => {
            sectionViewer.setSection(sectionSelect.value);
        });

        layoutSelect.addEventListener('change', () => {
            fullViewer.setLayout(layoutSelect.value);
        });

        fileInput.addEventListener('change', async () => {
            clearError();
            const file = fileInput.files?.[0];
            if (!file) {
                return;
            }
            try {
                applyPayload(JSON.parse(await file.text()));
            } catch (error) {
                showError(error);
            }
        });

        loadSample().catch(showError);
    </script>
</body>
</html>
