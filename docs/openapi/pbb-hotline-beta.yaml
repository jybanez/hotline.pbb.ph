openapi: 3.1.0
info:
  title: PBB Hotline Beta API
  version: 0.1.0-draft
  summary: Phase 1 API draft for PBB Hotline Beta aligned to the current inventory.
servers:
  - url: https://hotline.pbb.ph
tags:
  - name: Public
  - name: Auth
  - name: Account
  - name: Caller
  - name: Operator
  - name: Messaging
  - name: Media
  - name: Admin
  - name: Realtime
paths:
  /api/bootstrap:
    get:
      tags: [Public]
      summary: Bootstrap current app state
      responses:
        '200':
          description: Bootstrap payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'

  /api/public/alert-level:
    get:
      tags: [Public]
      summary: Get current public alert level
      responses:
        '200':
          description: Current alert level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicAlertLevelResponse'

  /api/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '422':
          description: Validation or auth failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'

  /api/reauth:
    post:
      tags: [Auth]
      summary: Re-authenticate expired session context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Re-auth success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '422':
          description: Validation or auth failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/session/ping:
    get:
      tags: [Auth]
      summary: Authenticated near-expiry session keepalive ping
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Session touched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPingResponse'
        '401':
          description: Session no longer valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/user:
    get:
      tags: [Account]
      summary: Get current authenticated user
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    post:
      tags: [Account]
      summary: Update current authenticated account
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Updated current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/user/password:
    post:
      tags: [Account]
      summary: Update current authenticated user password
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/caller/home:
    get:
      tags: [Caller]
      summary: Get caller home state
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Caller home payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallerHomeResponse'

  /api/caller/call-attempts:
    post:
      tags: [Caller]
      summary: Start a new call attempt
      security:
        - sessionAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallAttemptRequest'
      responses:
        '200':
          description: Call attempt started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallAttempt'
        '409':
          description: Blocked by current caller state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/caller/call-attempts/{attempt}/cancel:
    post:
      tags: [Caller]
      summary: Cancel an unanswered new call attempt
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '200':
          description: Call attempt cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallAttempt'
        '409':
          description: Call attempt can no longer be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/caller/incidents/current:
    get:
      tags: [Caller]
      summary: Get current open caller incident
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Current incident payload or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Incident'
                nullable: true

  /api/caller/incidents/history:
    get:
      tags: [Caller]
      summary: Get caller incident history excluding the current open incident
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Caller incident history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallerIncidentHistoryResponse'

  /api/caller/incidents/{incident}:
    get:
      tags: [Caller]
      summary: Get one caller-visible incident view
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Caller incident payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'

  /api/caller/incidents/{incident}/reconnect:
    post:
      tags: [Caller]
      summary: Request reconnect to the assigned operator
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Reconnect request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallSession'
        '409':
          description: Reconnect blocked by operator state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/caller/call-sessions/{callSession}/cancel:
    post:
      tags: [Caller]
      summary: Cancel an unanswered reconnect call session
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CallSessionId'
      responses:
        '200':
          description: Reconnect call session cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallSession'
        '409':
          description: Call session can no longer be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/dashboard:
    get:
      tags: [Operator]
      summary: Get operator dashboard payload
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Operator dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDashboardResponse'

  /api/operator/incidents:
    get:
      tags: [Operator]
      summary: Get operator incident list feed
      security:
        - sessionAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Comma-separated incident statuses, such as `active,deferred`.
      responses:
        '200':
          description: Operator incident list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorIncidentListResponse'

  /api/operator/incidents/{incident}:
    get:
      tags: [Operator]
      summary: Get full operator workbench payload
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Incident workbench payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '403':
          description: Operator may no longer open this incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Incident no longer available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/call-attempt-operator-attempts/{attempt}/answer:
    post:
      tags: [Operator]
      summary: Answer a routed new call operator attempt
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '200':
          description: New call answered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerCallAttemptResponse'
        '409':
          description: Attempt can no longer be answered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/call-attempt-operator-attempts/{attempt}/decline:
    post:
      tags: [Operator]
      summary: Decline an unanswered incoming new call
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '200':
          description: Attempt declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '409':
          description: Attempt can no longer be declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/call-sessions/{callSession}/answer:
    post:
      tags: [Operator]
      summary: Answer reconnect call session request
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CallSessionId'
      responses:
        '200':
          description: Reconnect answered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallSession'
        '409':
          description: Call session can no longer be answered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/call-sessions/{callSession}/hangup:
    post:
      tags: [Operator]
      summary: End a live call
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CallSessionId'
      responses:
        '200':
          description: Call session ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallSession'
        '409':
          description: Call session can no longer be ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/call-sessions/{callSession}/mute:
    post:
      tags: [Operator]
      summary: Update operator mute state for a live call
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CallSessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallSessionMuteRequest'
      responses:
        '200':
          description: Mute state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '409':
          description: Mute state cannot be changed in the current call state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/incidents/{incident}/status:
    post:
      tags: [Operator]
      summary: Move incident status
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentStatusUpdateRequest'
      responses:
        '200':
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '409':
          description: Status change blocked by business rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/incidents/{incident}/actual-caller:
    post:
      tags: [Operator]
      summary: Update actual caller fields
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualCallerUpdateRequest'
      responses:
        '200':
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'

  /api/operator/incidents/{incident}/other-details:
    post:
      tags: [Operator]
      summary: Update incident other details
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtherDetailsUpdateRequest'
      responses:
        '200':
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'

  /api/operator/incidents/{incident}/incident-type-details:
    post:
      tags: [Operator]
      summary: Create or update grouped incident type details
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentTypeDetailsUpsertRequest'
      responses:
        '200':
          description: Updated incident type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeDetailsUpsertResponse'

  /api/operator/incidents/{incident}/transfers:
    post:
      tags: [Operator]
      summary: Request incident transfer
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '200':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '409':
          description: Transfer cannot be created in the current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/transfers/{transfer}/accept:
    post:
      tags: [Operator]
      summary: Accept transfer
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: Transfer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '409':
          description: Transfer can no longer be accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/transfers/{transfer}/reject:
    post:
      tags: [Operator]
      summary: Reject transfer
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: Transfer rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '409':
          description: Transfer can no longer be rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operator/incidents/{incident}/team-assignments:
    post:
      tags: [Operator]
      summary: Assign a team to an incident
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamAssignmentRequest'
      responses:
        '200':
          description: Team assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamAssignment'

  /api/operator/team-assignments/{assignment}:
    post:
      tags: [Operator]
      summary: Update one team assignment
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamAssignmentRequest'
      responses:
        '200':
          description: Team assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamAssignment'
    delete:
      tags: [Operator]
      summary: Delete assignment only when canceling from the initial Assigned state
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      responses:
        '200':
          description: Team assignment deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '409':
          description: Team assignment cannot be deleted in the current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/incidents/{incident}/messages:
    get:
      tags: [Messaging]
      summary: Get incident chat history
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Incident messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
    post:
      tags: [Messaging]
      summary: Create incident message during live call
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '409':
          description: Messaging currently blocked by live-call rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/incidents/{incident}/message-attachments:
    post:
      tags: [Messaging]
      summary: Finalize persisted message attachment metadata
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageAttachmentRequest'
      responses:
        '200':
          description: Message attachment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAttachment'

  /api/incidents/{incident}/media:
    get:
      tags: [Media]
      summary: Get incident-level merged media chronology
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Incident media chronology
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'

  /api/media/assembly/complete:
    post:
      tags: [Media]
      summary: Finalize merged media availability from internal background work
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaAssemblyCompleteRequest'
      responses:
        '200':
          description: Media assembly completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'

  /api/admin/summary:
    get:
      tags: [Admin]
      summary: Get admin landing summary
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSummaryResponse'

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List users
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
    post:
      tags: [Admin]
      summary: Create user
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpsertRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/admin/users/{user}:
    get:
      tags: [Admin]
      summary: Get one user
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    post:
      tags: [Admin]
      summary: Update user
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpsertRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [Admin]
      summary: Delete user
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '409':
          description: Delete blocked by existing references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/incident-categories:
    get:
      tags: [Admin]
      summary: List incident categories
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Incident categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentCategoryListResponse'
    post:
      tags: [Admin]
      summary: Create incident category
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCategoryUpsertRequest'
      responses:
        '200':
          description: Incident category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentCategory'

  /api/admin/incident-categories/{category}:
    post:
      tags: [Admin]
      summary: Update incident category
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCategoryUpsertRequest'
      responses:
        '200':
          description: Incident category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentCategory'
    delete:
      tags: [Admin]
      summary: Delete incident category
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          description: Incident category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicOkResponse'
        '409':
          description: Delete blocked by existing references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/incident-types:
    get:
      tags: [Admin]
      summary: List incident types
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Incident types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeListResponse'
    post:
      tags: [Admin]
      summary: Create incident type
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentTypeUpsertRequest'
      responses:
        '200':
          description: Incident type created
          content:
            application/json:
              schema:
