components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: laravel_session

  parameters:
    IncidentId:
      in: path
      name: incident
      required: true
      schema:
        type: integer
    AttemptId:
      in: path
      name: attempt
      required: true
      schema:
        type: integer
    CallSessionId:
      in: path
      name: callSession
      required: true
      schema:
        type: integer
    TransferId:
      in: path
      name: transfer
      required: true
      schema:
        type: integer
    AssignmentId:
      in: path
      name: assignment
      required: true
      schema:
        type: integer
    UserId:
      in: path
      name: user
      required: true
      schema:
        type: integer
    CategoryId:
      in: path
      name: category
      required: true
      schema:
        type: integer
    TypeId:
      in: path
      name: type
      required: true
      schema:
        type: integer
    FieldId:
      in: path
      name: field
      required: true
      schema:
        type: integer
    TeamId:
      in: path
      name: team
      required: true
      schema:
        type: integer
    ResourceTypeId:
      in: path
      name: resourceType
      required: true
      schema:
        type: integer
    ResourceTypeCategoryId:
      in: path
      name: resourceTypeCategory
      required: true
      schema:
        type: integer

  schemas:
    BasicOkResponse:
      type: object
      properties:
        ok: { type: boolean, const: true }
        message: { type: string }
      required: [ok, message]

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        code: { type: string, nullable: true }
        details:
          oneOf:
            - type: object
            - type: array
              items: {}
            - type: string
          nullable: true
      required: [message]

    ValidationErrorResponse:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
      required: [message, errors]

    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
      required: [email, password]

    UpdateAccountRequest:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        mobile: { type: string }
        avatar: { type: string, nullable: true }
      required: [name, email, mobile]

    ChangePasswordRequest:
      type: object
      properties:
        current_password: { type: string }
        new_password: { type: string }
        confirm_password: { type: string }
      required: [current_password, new_password, confirm_password]

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        avatar: { type: string, nullable: true }
        mobile: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [caller, operator, command, admin]
        status:
          type: string
          enum: [active, suspended, disabled, pending]
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, mobile, email, role, status, created_at, updated_at]

    AuthSuccessResponse:
      type: object
      properties:
        ok: { type: boolean, const: true }
        user: { $ref: '#/components/schemas/User' }
      required: [ok, user]

    SessionPingResponse:
      type: object
      properties:
        ok: { type: boolean, const: true }
        data:
          type: object
          properties:
            csrf_token: { type: string, nullable: true }
            touched_at: { type: string, format: date-time }
          required: [touched_at]
      required: [ok, data]

    BootstrapResponse:
      type: object
      properties:
        authenticated: { type: boolean }
        user:
          allOf:
            - $ref: '#/components/schemas/User'
          nullable: true
        alert_level:
          type: string
          enum: [Normal, Elevated, Critical]
        alert_level_description: { type: string }
      required: [authenticated, alert_level]

    PublicAlertLevelResponse:
      type: object
      properties:
        alert_level:
          type: string
          enum: [Normal, Elevated, Critical]
        description: { type: string }
      required: [alert_level, description]

    CallerSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        avatar: { type: string, nullable: true }
        mobile: { type: string }
      required: [id, name, mobile]

    OperatorSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        level: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
      required: [id, name]

    CallerAvailability:
      type: object
      properties:
        status:
          type: string
          enum: [green, yellow, red]
        service_reachable: { type: boolean }
        call_service_ready: { type: boolean }
        available_operator_count: { type: integer, minimum: 0 }
      required: [status, service_reachable, call_service_ready, available_operator_count]

    CallerIncidentSummary:
      type: object
      properties:
        id: { type: integer }
        display_id: { type: string }
        status:
          type: string
          enum: [Active, Deferred, Discarded, Resolved]
        created_at: { type: string, format: date-time }
      required: [id, display_id, status, created_at]

    CallerIncidentHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CallerIncidentSummary'
      required: [items]

    CallerHomeResponse:
      type: object
      properties:
        current_open_incident:
          allOf:
            - $ref: '#/components/schemas/CallerIncidentSummary'
          nullable: true
        recent_incidents:
          type: array
          items:
            $ref: '#/components/schemas/CallerIncidentSummary'
        availability:
          $ref: '#/components/schemas/CallerAvailability'
        alert_level:
          type: string
          enum: [Normal, Elevated, Critical]
        call_hold_seconds: { type: integer }
      required: [current_open_incident, recent_incidents, availability, alert_level, call_hold_seconds]

    CreateCallAttemptRequest:
      type: object
      properties:
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }

    CallAttempt:
      type: object
      properties:
        id: { type: integer }
        caller_id: { type: integer }
        incident_id: { type: integer, nullable: true }
        answered_by_operator_id: { type: integer, nullable: true }
        status:
          type: string
          enum: [calling, ended]
        outcome:
          type: string
          enum: [answered, timed_out, declined_by_operator, cancelled_by_citizen, cancelled_by_caller, ended_by_operator, ended_by_citizen, ended_by_caller]
        caller_latitude: { type: number, nullable: true }
        caller_longitude: { type: number, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, caller_id, status, outcome, started_at, created_at, updated_at]

    CallParticipant:
      type: object
      properties:
        id: { type: integer }
        call_session_id: { type: integer }
        user_id: { type: integer }
        participant_role:
          type: string
          enum: [citizen, caller, operator]
        joined_at: { type: string, format: date-time }
        left_at: { type: string, format: date-time, nullable: true }
      required: [id, call_session_id, user_id, participant_role, joined_at]

    CallSession:
      type: object
      properties:
        id: { type: integer }
        incident_id: { type: integer }
        caller_id: { type: integer }
        status:
          type: string
          enum: [calling, in_progress, ended]
        outcome:
          type: string
          enum: [answered, timed_out, declined_by_operator, cancelled_by_citizen, cancelled_by_caller, ended_by_operator, ended_by_citizen, ended_by_caller]
        started_at: { type: string, format: date-time }
        answered_at: { type: string, format: date-time, nullable: true }
        ended_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        participants:
          type: array
          items:
            $ref: '#/components/schemas/CallParticipant'
      required: [id, incident_id, caller_id, status, outcome, started_at, created_at, updated_at]

    Transfer:
      type: object
      properties:
        id: { type: integer }
        incident_id: { type: integer }
        from_operator_id: { type: integer }
        to_operator_id: { type: integer }
        reason: { type: string }
        status: { type: string }
        requested_at: { type: string, format: date-time }
        accepted_at: { type: string, format: date-time, nullable: true }
        rejected_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
      required: [id, incident_id, from_operator_id, to_operator_id, reason, status, requested_at]

    MessageAttachment:
      type: object
      properties:
        id: { type: integer }
        message_id: { type: integer }
        type: { type: string }
        mime_type: { type: string }
        original_filename: { type: string }
        stored_path: { type: string }
        file_size: { type: integer }
        thumbnail_path: { type: string, nullable: true }
        uploaded_by: { type: integer }
        created_at: { type: string, format: date-time }
      required: [id, message_id, type, mime_type, original_filename, stored_path, file_size, uploaded_by, created_at]

    Message:
      type: object
      properties:
        id: { type: integer }
        incident_id: { type: integer }
        sender_id: { type: integer }
        sender_role:
          type: string
          enum: [caller, operator, system]
        sender_name: { type: string }
        sender_avatar: { type: string, nullable: true }
        body: { type: string }
        type:
          type: string
          enum: [message, system]
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/MessageAttachment'
        created_at: { type: string, format: date-time }
      required: [id, incident_id, sender_id, sender_role, sender_name, body, type, attachments, created_at]

    MediaRecord:
      type: object
      properties:
        id: { type: integer }
        incident_id: { type: integer }
        call_session_id: { type: integer }
        type:
          type: string
          enum: [audio_peer, caller_video]
        peer_user_id: { type: integer, nullable: true }
        peer_role: { type: string, nullable: true }
        peer_label: { type: string, nullable: true }
        path: { type: string }
        duration_seconds: { type: integer, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        available_at: { type: string, format: date-time, nullable: true }
      required: [id, incident_id, call_session_id, type, path, created_at]

    IncidentResourceNeeded:
      type: object
      properties:
        resource_type_id: { type: integer }
        resource_name: { type: string }
        quantity_required: { type: integer }
        notes: { type: string, nullable: true }
      required: [resource_type_id, resource_name, quantity_required]

    IncidentTypeDetail:
      type: object
      properties:
        id: { type: integer }
        incident_id: { type: integer }
        incident_type_id: { type: integer }
        field_id: { type: integer }
        field_label: { type: string }
        field_key: { type: string }
        field_value: {}
        input_type: { type: string }
        options:
          type: array
          items: {}
        unit: { type: string, nullable: true }
        placeholder: { type: string, nullable: true }
        is_required: { type: boolean }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, incident_id, incident_type_id, field_id, field_label, field_key, field_value, input_type, is_required, sort_order, created_at, updated_at]

    TeamResourceInventory:
      type: object
      properties:
        id: { type: integer }
        team_id: { type: integer }
        resource_type_id: { type: integer }
        resource_name: { type: string }
        quantity_available: { type: integer }
        created_at: { type: string, format: date-time }
      required: [id, team_id, resource_type_id, resource_name, quantity_available, created_at]

    Team:
      type: object
      properties:
        id: { type: integer }
        team_category_id: { type: integer, nullable: true }
        category: { type: string, nullable: true }
        name: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        resources:
          type: array
          items:
            $ref: '#/components/schemas/TeamResourceInventory'
      required: [id, name, status, created_at, resources]

    TeamAssignment:
      type: object
      properties:
