openapi: 3.0.3
info:
  title: PBB - HQ API
  version: 1.0.0
  description: |
    Canonical PBB - HQ hub registry API for hub and uplink topology lookups.

    These endpoints are intended for machine-readable consumption by systems
    such as Hub Relay and related engineering tools.

    Identity rule:

    - `id` is the HQ hub record primary key and record reference
    - `relay_hub_id` is the canonical Relay-facing stable hub identity used for
      Relay `/api/status` matching and Relay-to-HQ identity alignment
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Hubs
    description: Canonical hub registry and topology endpoints
paths:
  /api/hubs:
    get:
      tags:
        - Hubs
      summary: List hubs
      description: |
        Returns the canonical list of hubs and their uplink/source relationships.

        Identity notes:

        - `id` is the HQ record key
        - `relay_hub_id` is the stable Relay identity key
      parameters:
        - in: query
          name: deployment
          schema:
            type: string
            enum: [barangay, city, province, region, national, foundation, other]
          description: Filter by deployment type.
        - in: query
          name: status
          schema:
            type: string
            enum: [planned, provisioning, active, inactive, maintenance, retired]
          description: Filter by hub status.
        - in: query
          name: code
          schema:
            type: string
          description: Filter by exact hub code.
        - in: query
          name: domain
          schema:
            type: string
          description: Filter by exact hub domain.
      responses:
        '200':
          description: Hub list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      hubs:
                        type: array
                        items:
                          $ref: '#/components/schemas/Hub'
                      count:
                        type: integer
                        example: 6
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/hubs/{hub}:
    get:
      tags:
        - Hubs
      summary: Get hub details
      description: |
        Returns the canonical detail payload for a specific hub.

        Identity notes:

        - path parameter `{hub}` is the HQ numeric hub record id
        - `relay_hub_id` in the response is the Relay-facing stable identity key
      parameters:
        - in: path
          name: hub
          required: true
          schema:
            type: integer
          description: Hub ID
      responses:
        '200':
          description: Hub detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      hub:
                        $ref: '#/components/schemas/Hub'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hub not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HubToken
      description: |
        Canonical API access uses a hub-owned bearer token from the hub_tokens table.
        Send `Authorization: Bearer <token>`.
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: false
              data:
                nullable: true
              meta:
                nullable: true
              error:
                type: string
                example: Unauthenticated.
  schemas:
    Hub:
      type: object
      description: |
        Canonical HQ hub record.

        Identity semantics:

        - `id`: HQ record primary key/reference
        - `relay_hub_id`: stable Relay-facing hub identity used for relay/node matching
      properties:
        id:
          type: integer
          example: 14
          description: HQ hub record primary key.
        relay_hub_id:
          type: string
          nullable: true
          example: city-hub-01
          description: Canonical Relay-facing stable hub identity. Relay should use this for `/api/status` and peer identity matching, not the numeric HQ `id`.
        name:
          type: string
          example: CEBU CITY, CEBU
        code:
          type: string
          nullable: true
          example: CEBU-CITY-001
        deployment:
          type: string
          enum: [barangay, city, province, region, national, foundation, other]
        domain:
          type: string
          nullable: true
          example: cebu-city.hub.pbb.ph
        status:
          type: string
          enum: [planned, provisioning, active, inactive, maintenance, retired]
        country_code:
          type: string
          nullable: true
          example: PH
        reg_code:
          type: string
          nullable: true
          example: '07'
        prov_code:
          type: string
          nullable: true
          example: '0722'
        citymun_code:
          type: string
          nullable: true
          example: '072217'
        brgy_code:
          type: string
          nullable: true
          example: '072217001'
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-03-13T07:30:00+08:00'
        last_response_ms:
          type: integer
          nullable: true
          example: 121
        deployed_at:
          type: string
          format: date
          nullable: true
          example: '2026-03-01'
        token:
          $ref: '#/components/schemas/HubToken'
        uplinks:
          type: array
          items:
            $ref: '#/components/schemas/Uplink'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
    Uplink:
      type: object
      properties:
        id:
          type: integer
          example: 21
        uplink_hub_id:
          type: integer
          example: 6
        uplink_type:
          type: string
          example: hierarchy
        uplink_domain:
          type: string
          nullable: true
          example: cebu.hub.pbb.ph
        priority:
          type: integer
          nullable: true
          example: 1
        is_primary:
          type: boolean
          example: true
        hub:
          $ref: '#/components/schemas/LinkedHub'
    Source:
      type: object
      properties:
        id:
          type: integer
          example: 33
        hub_id:
          type: integer
          example: 14
        uplink_type:
          type: string
          example: hierarchy
        is_primary:
          type: boolean
          example: true
        priority:
          type: integer
          nullable: true
          example: 1
        hub:
          $ref: '#/components/schemas/LinkedHub'
    LinkedHub:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          example: 6
        name:
          type: string
          example: CEBU, REGION VII (CENTRAL VISAYAS)
        code:
          type: string
          nullable: true
          example: CEBU-001
        deployment:
          type: string
          example: province
        domain:
          type: string
          nullable: true
          example: cebu.hub.pbb.ph
        status:
          type: string
          example: planned
    HubToken:
      type: object
      properties:
        has_token:
          type: boolean
          example: true
        is_active:
          type: boolean
          example: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
